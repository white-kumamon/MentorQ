<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>MenthorQ Export</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 12px; width: 350px; }
      button { width: 100%; margin-top: 8px; padding: 8px; }
      #status { margin-top: 10px; font-size: 12px; white-space: pre-wrap; max-height: 180px; overflow: auto; }
      label, input, textarea { width: 100%; box-sizing: border-box; }
      input, textarea { margin-top: 6px; padding: 6px; }
      textarea { min-height: 70px; resize: vertical; }
      .section { border-top: 1px solid #ddd; margin-top: 12px; padding-top: 12px; }
      .muted { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h3>MenthorQ Levels Export</h3>
    <label for="symbolInput">Symbol (単発保存時 / 例: SPX)</label>
    <input id="symbolInput" placeholder="SPX" />

    <button id="exportJson">現在表示をJSONで保存</button>
    <button id="exportCsv">現在表示をCSVで保存</button>

    <div class="section">
      <label for="tickerListInput">自動収集対象ティッカー（カンマ/改行区切り）</label>
      <textarea id="tickerListInput" placeholder="SPY, NQ1!, GLD"></textarea>

      <label for="daysBackInput">保存日数（過去N日）</label>
      <input id="daysBackInput" type="number" min="1" step="1" value="7" />

      <label for="saveDirInput">保存先ディレクトリ（Downloads配下）</label>
      <input id="saveDirInput" placeholder="mentorq-levels" value="mentorq-levels" />

      <button id="runTickerAuto">指定銘柄を自動収集（Gamma Levels EOD）</button>
      <div class="muted">指定銘柄のみを収集します。不足日がある場合は Prev Date で遡って補完し、1つのJSONにまとめて保存します。</div>
    </div>

    <div id="status">app.menthorq.io/en/levels の結果画面で使ってください。</div>

    <script src="popup.js"></script>
  </body>
</html>
